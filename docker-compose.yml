version: "3.9"

services:
  seniorshield:
    build: .
    container_name: seniorshield-api
    restart: unless-stopped
    ports:
      - "3000:3000"   # HTTP + Dashboard
      - "3001:3001"   # WebSocket
    environment:
      PORT:     3000
      WS_PORT:  3001
      API_KEY:  ${API_KEY:-seniorshield-secret-key}
      NODE_ENV: production
    volumes:
      # Mount dashboard ke public/ agar bisa diakses via HTTP
      - ./index.html:/app/public/index.html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/api/status"]
      interval: 30s
      timeout:  10s
      retries:  3
